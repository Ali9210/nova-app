    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    if (file.size > 4 * 1024 * 1024) { setErr("الصورة كبيرة جداً (الحد الأقصى 4MB)."); return; }
    var fd = new FormData();
    fd.append("avatar", file);
    setSaving(true);
    apiCall("/api/auth/avatar", { method: "POST", isForm: true, body: fd })
      .then(function (data) { setDraft(data.user); setUser(data.user); })
      .catch(function (e) { setErr(e.message); })
      .finally(function () { setSaving(false); });
  }

  function save() {
    setErr(""); setSaving(true);
    apiCall("/api/auth/me", { method: "PUT", body: { name: draft.name, username: draft.username, bio: draft.bio } })
      .then(function (data) { setUser(data.user); setEditing(false); })
      .catch(function (e) { setErr(e.message); })
      .finally(function () { setSaving(false); });
  }

  var myTweets = tweets.filter(function (t) { return t.authorId === user.id; });

  var editModal = editing ? e("div", {
    style: { position: "fixed", inset: 0, background: "rgba(5,5,10,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 16 },
    onClick: function () { setEditing(false); }
  },
    e("div", { onClick: function (ev) { ev.stopPropagation(); }, style: { width: "100%", maxWidth: 380, background: "#14141F", border: "1px solid #26263A", borderRadius: 18, padding: 20, maxHeight: "85vh", overflowY: "auto" } },
      e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
        e("h3", { style: { margin: 0, fontFamily: "'Space Grotesk', sans-serif", fontSize: 17 } }, "تعديل الملف الشخصي"),
        e("button", { onClick: function () { setEditing(false); }, style: { background: "none", border: "none", color: "#8C8CA6", cursor: "pointer" } }, e(XIcon, { size: 20 }))
      ),
      err ? e("div", { style: { display: "flex", gap: 8, alignItems: "center", background: "rgba(244,63,94,0.1)", border: "1px solid rgba(244,63,94,0.3)", color: "#F43F5E", borderRadius: 10, padding: "9px 12px", fontSize: 13, marginBottom: 14 } }, e(AlertIcon, { size: 15 }), err) : null,
      e("div", { style: { display: "flex", justifyContent: "center", marginBottom: 16 } },
        e("div", { style: { position: "relative" } },
          e(Avatar, { user: draft, size: 84 }),
          e("button", { onClick: function () { fileRef.current && fileRef.current.click(); }, style: { position: "absolute", bottom: -2, left: -2, background: "#0A0A12", border: "1px solid #26263A", borderRadius: "50%", width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#F2F2F7" } }, e(CameraIcon, { size: 14 })),
          e("input", { ref: fileRef, type: "file", accept: "image/*", hidden: true, onChange: pickImage })
        )
      ),
      e("label", { style: labelStyle }, "الاسم"),
      e("input", { style: inputStyle, value: draft.name, onChange: function (ev) { setDraft(Object.assign({}, draft, { name: ev.target.value })); } }),
      e("label", { style: labelStyle }, "اسم المستخدم"),
      e("div", { style: { position: "relative" } },
        e("span", { style: { position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#57576b", fontSize: 14 } }, "@"),
        e("input", { style: Object.assign({}, inputStyle, { paddingRight: 26 }), value: draft.username, onChange: function (ev) { setDraft(Object.assign({}, draft, { username: ev.target.value })); } })
      ),
      e("label", { style: labelStyle }, "النبذة التعريفية"),
      e("textarea", { style: Object.assign({}, inputStyle, { resize: "none" }), rows: 3, value: draft.bio || "", onChange: function (ev) { setDraft(Object.assign({}, draft, { bio: ev.target.value })); } }),
      e("div", { style: { display: "flex", gap: 10, marginTop: 18 } },
        e("button", { onClick: save, disabled: saving, style: Object.assign({}, btnStyle("solid"), { display: "flex", gap: 6 }) }, saving ? e(LoaderIcon, { size: 16 }) : e(CheckIcon, { size: 16 }), " حفظ"),
        e("button", { onClick: function () { setEditing(false); }, style: btnStyle("outline") }, "إلغاء")
      )
    )
  ) : null;

  var tweetsList = myTweets.length === 0
    ? e("p", { style: { textAlign: "center", color: "#57576b", padding: 40, fontSize: 14 } }, "لم تنشر أي تغريدة بعد.")
    : myTweets.map(function (t) { return e(Tweet, { key: t.id, tweet: t, onLike: function () {}, onRetweet: function () {} }); });

  return e("div", null,
    e("div", { style: { height: 110, background: "linear-gradient(120deg,#3B1E63,#5D2560 45%,#1E3A63)" } }),
    e("div", { style: { padding: "0 16px" } },
      e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginTop: -38 } },
        e("div", { style: { border: "4px solid #0A0A12", borderRadius: "50%", background: "#0A0A12" } }, e(Avatar, { user: user, size: 78 })),
        e("button", { onClick: function () { setEditing(true); }, style: Object.assign({}, btnStyle("outline"), { width: "auto", padding: "8px 18px", marginBottom: 6 }) }, "تعديل الملف الشخصي")
      ),
      e("h2", { style: { fontFamily: "'Space Grotesk', sans-serif", margin: "12px 0 0", fontSize: 20 } }, user.name),
      e("p", { style: { color: "#8C8CA6", margin: "2px 0 10px", fontSize: 14 } }, "@" + user.username),
      user.bio ? e("p", { style: { margin: "0 0 14px", fontSize: 14.5, lineHeight: 1.6 } }, user.bio) : null,
      e("div", { style: { display: "flex", gap: 18, fontSize: 13, color: "#8C8CA6", paddingBottom: 14, borderBottom: "1px solid #1C1C2A" } },
        e("span", null, e("b", { style: { color: "#F2F2F7" } }, myTweets.length), " تغريدات")
      )
    ),
    tweetsList,
    editModal

}

/* ================= APP ================= */
function App() {
  var useState = React.useState, useEffect = React.useEffect;
  var statusState = useState("loading"); var status = statusState[0], setStatus = statusState[1];
  var userState = useState(null); var user = userState[0], setUser = userState[1];
  var viewState = useState("feed"); var view = viewState[0], setView = viewState[1];
  var tweetsState = useState([]); var tweets = tweetsState[0], setTweets = tweetsState[1];
  var loadingFeedState = useState(false); var loadingFeed = loadingFeedState[0], setLoadingFeed = loadingFeedState[1];
  var configState = useState(null); var config = configState[0], setConfig = configState[1];

  function loadTweets() {
    setLoadingFeed(true);
    return apiCall("/api/tweets").then(function (data) { setTweets(data.tweets); }).catch(function () {}).finally(function () { setLoadingFeed(false); });
  }

  useEffect(function () {
    apiCall("/api/config").then(setConfig).catch(function () { setConfig({ googleEnabled: false }); });
    var token = localStorage.getItem("nova_token");
    if (token) {
      apiCall("/api/auth/me").then(function (data) {
        setUser(data.user);
        setStatus("app");
        return loadTweets();
      }).catch(function () {
        localStorage.removeItem("nova_token");
        setStatus("auth");
      });
    } else {
      setStatus("auth");
    }
  }, []);

  function onAuthed(u) {
    setUser(u);
    setStatus("app");
    loadTweets();
  }
  function logout() {
    localStorage.removeItem("nova_token");
    setUser(null);
    setView("feed");
    setStatus("auth");
  }

  if (status === "loading") {
    return e("div", { style: { minHeight: "100vh", background: "#0A0A12" } }, e(Spinner, { label: "جارٍ التحميل..." }));
  }
  if (status === "auth" || !user) {
    return e(LoginScreen, { onAuthed: onAuthed, config: config });
  }

  var navBtn = function (key, IconComp, label) {
    return e("button", {
      onClick: function () { setView(key); },
      style: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "10px 0", background: "none", border: "none", cursor: "pointer", color: view === key ? "#F2F2F7" : "#57576b" }
    }, e(IconComp, { size: 22, filled: view === key }), e("span", { style: { fontSize: 11 } }, label));
  };

  return e("div", { dir: "rtl", style: { minHeight: "100vh", background: "#0A0A12", color: "#F2F2F7" } },
    e("div", { style: { maxWidth: 600, margin: "0 auto", borderInline: "1px solid #1C1C2A", minHeight: "100vh" } },
      e("header", { style: { position: "sticky", top: 0, zIndex: 10, background: "rgba(10,10,18,0.85)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px", borderBottom: "1px solid #1C1C2A" } },
        e("div", { style: { display: "flex", alignItems: "center", gap: 8 } }, e(NovaMark, { size: 30 }), e("span", { style: { fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 17 } }, "nova")),
        e("button", { onClick: logout, style: Object.assign({}, iconBtn, { fontSize: 13 }) }, e(LogoutIcon, { size: 16 }), " خروج")
      ),
      e("main", { style: { paddingBottom: 70 } },
        view === "feed"
          ? e(Feed, { user: user, tweets: tweets, setTweets: setTweets, loadingFeed: loadingFeed })
          : e(ProfileScreen, { user: user, setUser: setUser, tweets: tweets })
      ),
      e("nav", { style: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 600, display: "flex", background: "rgba(10,10,18,0.92)", backdropFilter: "blur(8px)", borderTop: "1px solid #1C1C2A" } },
        navBtn("feed", HomeIcon, "الرئيسية"),
        navBtn("profile", UserIcon, "حسابي")
      )
    )
  );
}

var rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(e(App));
rootEl.dataset.mounted = "1";
</script>
</body>
</html>
